<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>jsl_25th_Birthday</title>
<style>
    * {
        box-sizing: border-box;
    }

    html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #b6b5b5;
        font-family: Arial, sans-serif;
    }

    body {
        position: relative;
    }

    canvas {
        display: block;
        width: 100vw;
        height: 100vh;
    }

    .title-wrap {
        position: absolute;
        top: clamp(20px, 6vh, 80px);
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        width: 100%;
        text-align: center;
        pointer-events: none;
        padding: 0 12px;
    }

    .title-block {
        display: inline-flex;
        flex-direction: column;
        align-items: center;
        gap: clamp(6px, 1.5vh, 14px);
        animation: breathing 3.8s ease-in-out infinite;
    }

    @keyframes breathing {
        0%   { transform: scale(1); }
        50%  { transform: scale(1.04); }
        100% { transform: scale(1); }
    }

    .title-line {
        font-family: "Courier New", monospace;
        font-weight: 900;
        font-size: clamp(28px, 7vw, 65px);
        letter-spacing: clamp(0.5px, 0.35vw, 2px);
        text-transform: uppercase;
        line-height: 0.9;
        white-space: nowrap;
    }

    .title-line span {
        display: inline-block;
        text-shadow:
            3px 0 #111, -3px 0 #111, 0 3px #111, 0 -3px #111,
            3px 3px #111, -3px -3px #111, 3px -3px #111, -3px 3px #111;
    }

    .c1 { color: #ffd84d; }
    .c2 { color: #ff5c8a; }
    .c3 { color: #7ddc6d; }
    .c4 { color: #5bbcff; }

    #countdown {
        position: absolute;
        z-index: 12;
        color: #ffffff;
        font-size: clamp(28px, 8vw, 78px);
        font-weight: 900;
        min-width: clamp(56px, 12vw, 90px);
        text-align: center;
        text-shadow:
            0 0 6px rgba(255,255,255,1),
            0 0 16px rgba(255,255,255,0.95),
            0 0 30px rgba(255,220,130,0.9),
            0 0 46px rgba(255,200,100,0.75);
        pointer-events: none;
        transform: translateX(-50%);
    }

    .bottom {
        position: absolute;
        left: 50%;
        bottom: clamp(18px, 4vh, 42px);
        transform: translateX(-50%);
        z-index: 20;
        width: 100%;
        display: flex;
        justify-content: center;
        padding: 0 16px;
    }

    button {
        border: none;
        border-radius: 999px;
        padding: clamp(12px, 1.8vh, 14px) clamp(22px, 5vw, 30px);
        font-size: clamp(15px, 2.3vw, 18px);
        font-weight: 700;
        cursor: pointer;
        color: white;
        background: linear-gradient(135deg, #67b8ff, #3b82f6);
        box-shadow:
            0 0 0 4px #111,
            0 10px 24px rgba(0,0,0,0.18);
        animation: pulse 1.8s infinite;
        transition: transform 0.2s ease, opacity 0.2s ease, background 0.3s ease;
        white-space: nowrap;
        max-width: 90vw;
    }

    button:hover {
        transform: scale(1.03);
    }

    button.done {
        background: linear-gradient(135deg, #1d4ed8, #1e3a8a);
        animation: none;
    }

    button:disabled {
        opacity: 0.98;
        cursor: default;
    }

    @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.08); }
        100% { transform: scale(1); }
    }

    @media (max-width: 480px) {
        .title-line span {
            text-shadow:
                2px 0 #111, -2px 0 #111, 0 2px #111, 0 -2px #111,
                2px 2px #111, -2px -2px #111, 2px -2px #111, -2px 2px #111;
        }

        button {
            box-shadow:
                0 0 0 3px #111,
                0 8px 18px rgba(0,0,0,0.16);
        }
    }
</style>
</head>
<body>

<div class="title-wrap">
    <div class="title-block">
        <div class="title-line">
            <span class="c1">B</span><span class="c2">l</span><span class="c3">e</span><span class="c4">s</span><span class="c1">s</span><span class="c2">e</span><span class="c3">d</span>
            <span class="c4">2</span><span class="c1">5</span><span class="c2">t</span><span class="c3">h</span>
        </div>
        <div class="title-line">
            <span class="c1">B</span><span class="c2">i</span><span class="c3">r</span><span class="c4">t</span><span class="c1">h</span><span class="c2">d</span><span class="c3">a</span><span class="c4">y</span>
        </div>
    </div>
</div>

<canvas id="canvas"></canvas>
<div id="countdown"></div>

<div class="bottom">
    <button id="btn">倒数吹蜡烛</button>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const countdownEl = document.getElementById("countdown");
const btn = document.getElementById("btn");
const titleWrap = document.querySelector(".title-wrap");
const bottomWrap = document.querySelector(".bottom");

let W = window.innerWidth;
let H = window.innerHeight;
canvas.width = W;
canvas.height = H;

let candleLit = true;
let flameTick = 0;
let countdownRunning = false;
let confetti = [];
let smokes = [];
let stars = [];

/* =========================
   场景自适应参数
========================= */
function getSceneMetrics() {
    const minSide = Math.min(W, H);
    const isMobile = W <= 768;

    const s = Math.max(4, Math.min(7, Math.floor(minSide / 120)));

    const titleRect = titleWrap.getBoundingClientRect();
    const bottomRect = bottomWrap.getBoundingClientRect();

    const safeTop = titleRect.bottom + (isMobile ? 28 : 36);
    const safeBottom = bottomRect.top - (isMobile ? 120 : 140);

    let cy = H * (isMobile ? 0.60 : 0.63);

    if (cy < safeTop + 60) cy = safeTop + 60;
    if (cy > safeBottom) cy = safeBottom;

    const cx = W / 2;

    const candleBaseY = cy - 22 * s;
    const candle1X = cx - 6 * s;
    const candle2X = cx + 2 * s;

    return {
        s,
        cx,
        cy,
        candleBaseY,
        candle1X,
        candle2X,
        titleBottom: titleRect.bottom
    };
}

function resizeCanvas() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W;
    canvas.height = H;
    initStars();
    positionCountdown();
}
window.addEventListener("resize", resizeCanvas);

function block(x, y, s, color) {
    ctx.fillStyle = color;
    ctx.fillRect(Math.round(x), Math.round(y), s, s);
}

function rectBlock(x, y, w, h, s, color) {
    ctx.fillStyle = color;
    ctx.fillRect(Math.round(x), Math.round(y), w * s, h * s);
}

function drawPattern(pattern, sx, sy, size, colorMap) {
    for (let r = 0; r < pattern.length; r++) {
        for (let c = 0; c < pattern[r].length; c++) {
            const key = pattern[r][c];
            if (key !== ".") {
                block(sx + c * size, sy + r * size, size, colorMap[key]);
            }
        }
    }
}

/* =========================
   倒数位置：放在蜡烛上方中间
   不碰标题，不碰蜡烛
========================= */
function positionCountdown() {
    const { s, candle1X, candle2X, candleBaseY, titleBottom } = getSceneMetrics();

    const candleCenterX = ((candle1X + 2 * s) + (candle2X + 2 * s)) / 2;

    const desiredTop = candleBaseY - 12 * s - 52;
    const minTop = titleBottom + 20;
    const finalTop = Math.max(desiredTop, minTop);

    countdownEl.style.left = `${candleCenterX}px`;
    countdownEl.style.top = `${finalTop}px`;
}

/* =========================
   背景星星
========================= */
function initStars() {
    stars = [];
    const count = Math.max(300, Math.floor((W * H) / 55000));

    for (let i = 0; i < count; i++) {
        stars.push({
            x: Math.random() * W,
            y: Math.random() * H,
            r: Math.random() * 1.6 + 0.8,
            alpha: Math.random() * 0.6 + 0.2,
            speed: Math.random() * 0.02 + 0.008,
            phase: Math.random() * Math.PI * 2
        });
    }
}

function drawStars() {
    for (const star of stars) {
        star.phase += star.speed;
        const a = star.alpha + Math.sin(star.phase) * 0.25;

        ctx.save();
        ctx.globalAlpha = Math.max(0.08, Math.min(0.95, a));
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
        ctx.fillStyle = "#ffffff";
        ctx.shadowBlur = 12;
        ctx.shadowColor = "rgba(255,255,255,0.95)";
        ctx.fill();
        ctx.restore();
    }
}

/* =========================
   蛋糕
========================= */
function drawCake(cx, cy, s) {
    const outline = "#111111";
    const cakeLight = "#8a552d";
    const cakeMid = "#6d3d1f";
    const cakeDark = "#4e2815";
    const cream = "#fbf3e7";
    const creamShade = "#eadbc7";
    const hl1 = "#9b6840";
    const hl2 = "#b57b4f";

    rectBlock(cx - 26*s, cy + 1*s, 52, 18, s, outline);
    rectBlock(cx - 25*s, cy + 2*s, 50, 16, s, cakeLight);
    rectBlock(cx - 25*s, cy + 8*s, 50, 7, s, cakeMid);
    rectBlock(cx - 25*s, cy + 15*s, 50, 3, s, cakeDark);

    rectBlock(cx - 22*s, cy - 1*s, 44, 2, s, cream);
    rectBlock(cx - 22*s, cy + 1*s, 44, 1, s, creamShade);

    const lowerDrips = [
        {x:-14, h:3}, {x:-7, h:2}, {x:0, h:4},
        {x:8, h:2}, {x:15, h:3}
    ];
    lowerDrips.forEach(d => {
        rectBlock(cx + d.x*s, cy + 1*s, 2, d.h, s, cream);
        rectBlock(cx + d.x*s, cy + (1 + d.h - 1)*s, 2, 1, s, creamShade);
    });

    rectBlock(cx - 16*s, cy - 12*s, 32, 13, s, outline);
    rectBlock(cx - 15*s, cy - 11*s, 30, 11, s, cakeLight);
    rectBlock(cx - 15*s, cy - 7*s, 30, 5, s, cakeMid);
    rectBlock(cx - 15*s, cy - 2*s, 30, 2, s, cakeDark);

    rectBlock(cx - 13*s, cy - 14*s, 26, 2, s, cream);
    rectBlock(cx - 13*s, cy - 12*s, 26, 1, s, creamShade);

    const upperDrips = [
        {x:-9, h:2}, {x:-2, h:3}, {x:6, h:2}
    ];
    upperDrips.forEach(d => {
        rectBlock(cx + d.x*s, cy - 12*s, 2, d.h, s, cream);
        rectBlock(cx + d.x*s, cy + (-12 + d.h - 1)*s, 2, 1, s, creamShade);
    });

    rectBlock(cx - 18*s, cy + 8*s, 3, 1, s, hl1);
    rectBlock(cx - 1*s,  cy + 11*s, 2, 1, s, hl2);
    rectBlock(cx + 13*s, cy + 9*s, 3, 1, s, hl1);
    rectBlock(cx - 9*s, cy - 6*s, 2, 1, s, hl2);
    rectBlock(cx + 6*s, cy - 5*s, 3, 1, s, hl1);
}

/* =========================
   蜡烛
========================= */
function drawSlimCandle(x, y, s, bodyColor) {
    const colorMap = {
        b: "#111111",
        c: bodyColor
    };

    const pattern = [
        "..b..",
        ".bcb.",
        ".bcb.",
        ".bcb.",
        ".bcb.",
        ".bcb.",
        ".bcb.",
        "..b.."
    ];

    drawPattern(pattern, x, y, s, colorMap);
    rectBlock(x + 2*s, y + 1*s, 1, 5, s, "rgba(255,255,255,0.25)");
}

function drawFlame(cx, cy, s, scale = 1) {
    const z = Math.max(1, Math.round(s * scale));
    const flamePattern = [
        "..b..",
        ".oyo.",
        ".ooo.",
        "..y.."
    ];
    const colorMap = {
        b: "#111111",
        o: "#ff8c1a",
        y: "#ffd84d"
    };
    drawPattern(flamePattern, cx - 2*z, cy, z, colorMap);
}

/* =========================
   烟雾
========================= */
function createSmoke(x, y, s) {
    for (let i = 0; i < 10; i++) {
        smokes.push({
            x: x + (Math.random() - 0.5) * 6 * s,
            y: y + (Math.random() - 0.5) * 3 * s,
            size: Math.random() * 1.8 * s + 0.8 * s,
            dx: (Math.random() - 0.5) * 0.6,
            dy: -(Math.random() * 0.9 + 0.5),
            life: 70 + Math.random() * 20,
            alpha: 1
        });
    }
}

function drawSmoke() {
    for (let i = smokes.length - 1; i >= 0; i--) {
        const m = smokes[i];
        m.x += m.dx;
        m.y += m.dy;
        m.life -= 1;
        m.alpha = Math.max(0, m.life / 90);

        ctx.save();
        ctx.globalAlpha = m.alpha;
        ctx.fillStyle = "#a9a9a9";
        ctx.fillRect(m.x, m.y, m.size, m.size);
        ctx.fillStyle = "#d5d5d5";
        ctx.fillRect(m.x + m.size * 0.35, m.y - m.size * 0.2, m.size * 0.7, m.size * 0.7);
        ctx.restore();

        if (m.life <= 0) smokes.splice(i, 1);
    }
}

/* =========================
   彩带
========================= */
function createConfetti() {
    confetti = [];
    for (let i = 0; i < 180; i++) {
        confetti.push({
            x: Math.random() * W,
            y: -20 - Math.random() * H * 0.4,
            size: Math.random() * 7 + 4,
            speedY: Math.random() * 2.7 + 1.5,
            speedX: (Math.random() - 0.5) * 1.4,
            rot: Math.random() * Math.PI,
            rotSpeed: (Math.random() - 0.5) * 0.15,
            color: `hsl(${Math.random() * 360}, 100%, 60%)`
        });
    }
}

function drawConfetti() {
    for (const c of confetti) {
        c.x += c.speedX;
        c.y += c.speedY;
        c.rot += c.rotSpeed;

        ctx.save();
        ctx.translate(c.x, c.y);
        ctx.rotate(c.rot);
        ctx.fillStyle = c.color;
        ctx.fillRect(-c.size / 2, -c.size / 2, c.size, c.size * 0.7);
        ctx.restore();
    }
    confetti = confetti.filter(c => c.y < H + 20);
}

/* =========================
   主场景
========================= */
function drawScene() {
    ctx.clearRect(0, 0, W, H);

    drawStars();

    const { s, cx, cy, candleBaseY, candle1X, candle2X } = getSceneMetrics();

    drawCake(cx, cy, s);

    drawSlimCandle(candle1X, candleBaseY, s, "#4eb0ff");
    drawSlimCandle(candle2X, candleBaseY, s, "#ff5c8a");

    if (candleLit) {
        flameTick += 0.03;
        const scale1 = 1 + Math.sin(flameTick) * 0.12;
        const scale2 = 1 + Math.cos(flameTick * 0.95) * 0.12;

        drawFlame(candle1X + 2*s, candleBaseY - 5*s, s, scale1);
        drawFlame(candle2X + 2*s, candleBaseY - 5*s, s, scale2);
    }

    drawSmoke();
    drawConfetti();

    positionCountdown();
    requestAnimationFrame(drawScene);
}

initStars();
drawScene();
positionCountdown();

/* =========================
   倒数
========================= */
btn.addEventListener("click", startCountdown);

function startCountdown() {
    if (countdownRunning) return;

    countdownRunning = true;
    btn.disabled = true;

    let count = 5;
    countdownEl.textContent = count;
    positionCountdown();

    const timer = setInterval(() => {
        count--;

        if (count > 0) {
            countdownEl.textContent = count;
            positionCountdown();
        } else {
            clearInterval(timer);
            countdownEl.textContent = "";
            candleLit = false;

            const { s, candleBaseY, candle1X, candle2X } = getSceneMetrics();

            createSmoke(candle1X + 2*s, candleBaseY - 2*s, s);
            createSmoke(candle2X + 2*s, candleBaseY - 2*s, s);
            createConfetti();

            btn.textContent = "蜡烛已吹灭";
            btn.classList.add("done");
        }
    }, 1000);
}
</script>

</body>
</html>
